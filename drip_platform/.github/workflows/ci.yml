name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drip_ci
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/drip_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r drip_platform/requirements.txt -r drip_platform/deploy/requirements-deploy.txt
          pip install pytest
      - name: Lint (syntax)
        run: python -m compileall -q drip_platform
      - name: Run migrations
        working-directory: drip_platform
        run: alembic upgrade head
      - name: Run test suite (Postgres)
        working-directory: drip_platform
        run: pytest -q tests/
