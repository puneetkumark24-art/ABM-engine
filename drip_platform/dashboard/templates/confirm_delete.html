{% extends "base.html" %}
{% block title %}Confirm delete{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ title }}</h1>
</div>

<div class="card" style="border-left:3px solid #dc2626;">
    <div class="card-body">
        <p style="font-size:14px; color:#1e293b; margin-bottom:16px;">{{ message }}</p>

        {% if extra_details %}
        <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:20px;">
            {% for label, value in extra_details %}
            <div style="font-size:13px; color:#475569;"><strong>{{ label }}:</strong> {{ value }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{{ confirm_url }}" style="display:inline;">
            <button type="submit" style="padding:10px 24px; border:none; border-radius:8px; background:#dc2626; color:#fff; cursor:pointer; font-size:14px;">{{ confirm_label }}</button>
            <a href="{{ cancel_url }}" style="padding:10px 24px; border-radius:8px; background:#f1f5f9; color:#475569; text-decoration:none; font-size:14px; margin-left:10px;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
