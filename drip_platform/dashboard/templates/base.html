<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DRIP{% endblock %} — Decimal Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; }
        
        .nav { background: #1B3A5C; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 32px; }
        .nav-brand { color: #fff; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
        .nav-brand span { color: #5DADE2; font-weight: 400; font-size: 14px; margin-left: 8px; }
        .nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 16px 0; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .nav a:hover, .nav a.active { color: #fff; border-bottom-color: #5DADE2; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 24px; font-weight: 600; color: #1B3A5C; }
        .page-header p { font-size: 14px; color: #64748b; margin-top: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #1B3A5C; }
        .stat-card .label { font-size: 12px; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
        .card-header h2 { font-size: 16px; font-weight: 600; color: #1B3A5C; }
        .card-header .badge { font-size: 12px; padding: 2px 10px; border-radius: 12px; font-weight: 500; }
        .card-body { padding: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; background: #f8fafc; color: #64748b; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
        tr:hover td { background: #f8fafc; }
        
        .badge-tier1 { background: #dc2626; color: #fff; }
        .badge-tier2 { background: #d97706; color: #fff; }
        .badge-tier3 { background: #64748b; color: #fff; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-amber { background: #fef3c7; color: #92400e; }
        .badge-purple { background: #f3e8ff; color: #6b21a8; }
        
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        
        .relevance-bar { width: 100px; height: 6px; background: #e2e8f0; border-radius: 3px; display: inline-block; vertical-align: middle; }
        .relevance-bar-fill { height: 100%; border-radius: 3px; background: #16a34a; }
        
        .influence-bar { width: 80px; height: 6px; background: #e2e8f0; border-radius: 3px; display: inline-block; vertical-align: middle; }
        .influence-bar-fill { height: 100%; border-radius: 3px; }
        
        .bank-card { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.15s; }
        .bank-card:hover { background: #f8fafc; }
        .bank-card:last-child { border-bottom: none; }
        .bank-card .bank-name { font-weight: 600; font-size: 15px; color: #1e293b; }
        .bank-card .bank-name-ar { font-size: 13px; color: #94a3b8; margin-left: 8px; }
        .bank-card .bank-meta { display: flex; gap: 16px; font-size: 12px; color: #64748b; margin-top: 4px; }
        .bank-card .bank-stats { margin-left: auto; display: flex; gap: 12px; text-align: center; }
        .bank-card .bank-stats .s-num { font-size: 18px; font-weight: 600; color: #1B3A5C; }
        .bank-card .bank-stats .s-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .section-grid { grid-template-columns: 1fr; } }
        
        .intel-item { padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .intel-item:last-child { border: none; }
        .intel-item .intel-title { font-weight: 600; font-size: 13px; color: #1e293b; }
        .intel-item .intel-body { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.5; }
        .intel-item .intel-meta { font-size: 11px; color: #94a3b8; margin-top: 6px; }
        
        .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-bar input, .search-bar select { padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: #fff; }
        .search-bar input { flex: 1; }
        
        a.link { color: #2563eb; text-decoration: none; }
        a.link:hover { text-decoration: underline; }
        
        .veto-flag { color: #dc2626; font-weight: 700; }
        .budget-flag { color: #16a34a; font-weight: 700; }

        .flow-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: start; }
        @media (max-width: 1100px) { .flow-grid { grid-template-columns: 1fr 1fr; } }
        .flow-col { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; min-height: 120px; }
        .flow-col-header { font-size: 13px; font-weight: 600; padding: 8px 10px; border-radius: 8px; margin-bottom: 12px; }
        .flow-col-sub { font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; margin-top: 2px; }
        .flow-col-connector { background: #f3e8ff; color: #6b21a8; }
        .flow-col-champion { background: #dbeafe; color: #1e40af; }
        .flow-col-decision { background: #fef3c7; color: #92400e; }
        .flow-col-csuite { background: #1B3A5C; color: #fff; }
        .flow-card { border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; border-left: 3px solid; }
        .flow-card-connector { background: #faf5ff; border-left-color: #6b21a8; }
        .flow-card-champion { background: #eff6ff; border-left-color: #1e40af; }
        .flow-card-decision { background: #fffbeb; border-left-color: #d97706; }
        .flow-card-csuite { background: #f1f5f9; border-left-color: #1B3A5C; }
        .flow-card-name { font-size: 13px; font-weight: 600; color: #1e293b; }
        .flow-card-title { font-size: 11px; color: #64748b; margin-top: 2px; }
        .flow-card-org { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .flow-card-contact { font-size: 11px; color: #475569; margin-top: 4px; }
        .flow-card-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #fff; margin-top: 6px; }

        .cmap-center { background: #1B3A5C; color: #fff; border-radius: 12px; padding: 16px 24px; display: inline-block; font-size: 16px; font-weight: 700; margin: 0 auto 40px; text-align: center; }
        .cmap-columns { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .cmap-col { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; min-width: 220px; max-width: 260px; flex: 1; }
        .cmap-col-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #1B3A5C; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #f1f5f9; }
        .cmap-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; background: #f8fafc; }
        .cmap-card:last-child { margin-bottom: 0; }
        .cmap-card-name { font-size: 13px; font-weight: 600; color: #1e293b; }
        .cmap-card-meta { font-size: 11px; color: #64748b; margin-top: 4px; }
        .cmap-card-entry { border-left: 3px solid #16a34a; background: #f0fdf4; }
        .cmap-card-cross { font-size: 11px; color: #7c3aed; margin-top: 6px; padding-top: 6px; border-top: 1px dashed #e2e8f0; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">DRIP <span>Decimal Relationship Intelligence Platform</span></div>
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/persons" class="{% if '/persons' in request.path %}active{% endif %}">Persons</a>
        <a href="/connectors" class="{% if '/connectors' in request.path %}active{% endif %}">Connectors</a>
        <a href="/initiatives" class="{% if '/initiatives' in request.path %}active{% endif %}">Initiatives</a>
        <a href="/uploads" class="{% if '/uploads' in request.path %}active{% endif %}">Uploads</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
