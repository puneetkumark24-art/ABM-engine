<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Decimal ABM</title>
    <style>
        :root { --bg: #0f1117; --surface: #1a1d27; --border: #2d3245; --text: #e4e6f0; --text-dim: #8b8fa3; --accent: #4f8cff; --red: #f87171; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:40px; width:380px; text-align:center; }
        .login-box h1 { font-size:20px; margin-bottom:6px; }
        .login-box p { font-size:13px; color:var(--text-dim); margin-bottom:24px; }
        .login-box input { width:100%; padding:12px; background:#232735; border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:14px; margin-bottom:16px; outline:none; }
        .login-box input:focus { border-color:var(--accent); }
        .login-box button { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
        .login-box button:hover { background:#3a73e0; }
        .error { color:var(--red); font-size:13px; margin-bottom:12px; }
        .logo { font-weight:700; font-size:15px; color:var(--accent); letter-spacing:0.5px; margin-bottom:20px; }
        .logo span { color:var(--text-dim); font-weight:400; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">DECIMAL <span>ABM</span></div>
        <h1>Dashboard Login</h1>
        <p>Enter your dashboard password to continue</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
